steps:
  - id: "detect-changes"
    name: "gcr.io/cloud-builders/git"
    waitFor: ["-"] 
    entrypoint: "bash"
    args:
      - -c
      - |
        git fetch --unshallow || true
        git fetch origin main > /dev/null 2>&1
        git diff --name-only origin/main...HEAD > /workspace/changed_files.txt

  - id: "install-dependencies"
    name: golang:1
    waitFor: ["-"]
    env:
      - "GOPATH=/gopath"
    volumes:
      - name: "go"
        path: "/gopath"
    script: |
      go get -d ./...

  - id: "compile-test-binary"
    name: golang:1
    waitFor: ["install-dependencies"]
    env:
      - "GOPATH=/gopath"
    volumes:
      - name: "go"
        path: "/gopath"
    script: |
      go test -c -race -cover \
      -coverpkg=./internal/sources/...,./internal/tools/... \
      $(go list ./tests/... | grep -v '/tests/prompts')
      chmod +x .ci/test_with_coverage.sh

  - id: "compile-prompt-test-binary"
    name: golang:1
    waitFor: ["install-dependencies"]
    env:
      - "GOPATH=/gopath"
    volumes:
      - name: "go"
        path: "/gopath"
    script: |
      for dir in ./tests/prompts/*; do
        if [ -d "$dir" ]; then
          PROMPT_TYPE=$(basename "$dir")
          echo "--- Compiling prompt test for ${PROMPT_TYPE} with targeted coverage ---"

          go test -c -race -cover \
            -coverpkg=./internal/prompts/... \
            -o "prompt.${PROMPT_TYPE}.test" \
            "${dir}"
        fi
      done

      chmod +x .ci/test_prompts_with_coverage.sh

  - id: "prompts-custom"
    name: golang:1
    waitFor: ["compile-prompt-test-binary"]
    entrypoint: /bin/bash
    env:
      - "GOPATH=/gopath"
    volumes:
      - name: "go"
        path: "/gopath"
    args:
      - -c
      - |
        .ci/test_prompts_with_coverage.sh "custom"

  - id: "cloud-sql-pg"
    name: golang:1
    waitFor: ["compile-test-binary", "detect-changes"]
    entrypoint: /bin/bash
    env:
      - "GOPATH=/gopath"
      - "CLOUD_SQL_POSTGRES_PROJECT=$PROJECT_ID"
      - "CLOUD_SQL_POSTGRES_INSTANCE=$_CLOUD_SQL_POSTGRES_INSTANCE"
      - "CLOUD_SQL_POSTGRES_DATABASE=$_DATABASE_NAME"
      - "CLOUD_SQL_POSTGRES_REGION=$_REGION"
      - "SERVICE_ACCOUNT_EMAIL=$SERVICE_ACCOUNT_EMAIL"
    secretEnv:
      ["CLOUD_SQL_POSTGRES_USER", "CLOUD_SQL_POSTGRES_PASS", "CLIENT_ID", "API_KEY"]
    volumes:
      - name: "go"
        path: "/gopath"
    args:
      - -c
      - |
        PATTERN="cloudsqlpg|internal/sources/postgres|tests/postgres|internal/server/|tests/common.go|tests/tool.go|.ci/"
        
        if grep -qE "$$PATTERN" /workspace/changed_files.txt; then
          echo "Relevant changes detected. Starting Cloud SQL Postgres tests..."
          .ci/test_with_coverage.sh \
            "Cloud SQL Postgres" \
            cloudsqlpg \
            postgressql \
            postgresexecutesql
        else
          echo "No relevant changes for Cloud SQL Postgres. Skipping shard."
          exit 0
        fi

