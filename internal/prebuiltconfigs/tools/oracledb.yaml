sources:
    oracle-source:
        kind: "oracle"
        connectionString: ${ORACLE_CONNECTION_STRING}
        walletLocation: ${ORACLE_WALLET:}
        user: ${ORACLE_USERNAME}
        password: ${ORACLE_PASSWORD}
        useOCI: ${ORACLE_USE_OCI:false}

tools:
    execute_sql:
        kind: oracle-execute-sql
        source: oracle-source
        description: "Executes any SQL statement."

    list_tables:
        kind: oracle-sql
        source: oracle-source
        description: "Lists all user tables in the connected schema, including segment size, row count, and last analyzed date. Filters by a comma-separated list of names. If names are omitted, lists all tables in the current user's schema."
        statement: | 
          SELECT 
                table_name 
          FROM  user_tables;

    list_active_sessions:
        kind: oracle-sql
        source: oracle-source
        description: "List the top N (default 50) currently running database sessions (STATUS='ACTIVE'), showing SID, OS User, Program, and the current SQL statement text."
        statement:  | 
         SELECT
                s.sid,
                s.serial#,
                s.username,
                s.osuser,
                s.program,
                s.status,
                s.wait_class,
                s.event,
                sql.sql_text
            FROM
                v$session s,
                v$sql sql
            WHERE
                s.status = 'ACTIVE'
                AND s.sql_id = sql.sql_id (+)
                AND s.audsid != userenv('sessionid') -- Exclude current session
            ORDER BY s.last_call_et DESC
            FETCH FIRST 50 ROWS ONLY;

    get_query_plan:
        kind: oracle-sql
        source: oracle-source
        description: "Generate a full execution plan for a single SQL statement using EXPLAIN PLAN. This can be used to analyze query performance without execution. Requires the SQL statement as input as a parameter."
        statement: |
            DECLARE
                plan_output CLOB;
            BEGIN
                EXECUTE IMMEDIATE 'EXPLAIN PLAN FOR ' || :query;
                SELECT DBMS_XPLAN.DISPLAY() INTO plan_output FROM DUAL;
                -- The result of a PL/SQL block with an OUT parameter is returned by the driver.
                -- We use a dummy SELECT to conform to tool structure, but the actual output is plan_output.
                :plan := plan_output;
            END;
        parameters:
            - name: query
              type: string
              description: "The SQL statement for which you want to generate plan (omit the EXPLAIN keyword)."

    list_top_sql_by_resource:
        kind: oracle-sql
        source: oracle-source
        description: "List the top N (default 5) SQL statements from the library cache based on a chosen resource metric (CPU, I/O, or Elapsed Time). Shows SQL ID, execution count, buffer gets, disk reads, CPU time, and elapsed time." 
        statement: | 
            SELECT
                sql_id,
                executions,
                buffer_gets,
                disk_reads,
                cpu_time / 1000000 AS cpu_seconds,
                elapsed_time / 1000000 AS elapsed_seconds
            FROM
                v$sql
            ORDER BY
                elapsed_time DESC
            FETCH FIRST 5 ROWS ONLY;
            
    list_tablespace_usage:
        kind: oracle-sql
        source: oracle-source
        description: "List tablespace names, total size, free space, and used percentage to monitor storage utilization."
        statement: |
            SELECT
                t.tablespace_name,
                TO_CHAR(t.total_bytes / 1024 / 1024, '99,999.00') AS total_mb,
                TO_CHAR(SUM(d.bytes) / 1024 / 1024, '99,999.00') AS free_mb,
                TO_CHAR((t.total_bytes - SUM(d.bytes)) / t.total_bytes * 100, '99.00') AS used_pct
            FROM
                (SELECT tablespace_name, SUM(bytes) AS total_bytes FROM dba_data_files GROUP BY tablespace_name) t,
                dba_free_space d
            WHERE
                t.tablespace_name = d.tablespace_name (+)
            GROUP BY
                t.tablespace_name, t.total_bytes
            ORDER BY
                used_pct DESC;

    list_invalid_objects:
        kind: oracle-sql  
        source: oracle-source  
        description: "Lists all database objects that are in an invalid state, requiring recompilation (e.g., procedures, functions, views)."  
        statement: |  
            SELECT  
                owner,  
                object_type,  
                object_name,  
                status  
            FROM  
                dba_objects  
            WHERE  
                status = 'INVALID'  
                AND owner NOT IN ('SYS', 'SYSTEM') -- Exclude system schemas for clarity  
            ORDER BY  
                owner, object_type, object_name; 

toolsets:
    oracle_database_tools:
        - execute_sql
        - list_tables
        - list_active_sessions
        - get_query_plan
        - list_top_sql_by_resource
        - list_tablespace_usage
        - list_invalid_objects
        